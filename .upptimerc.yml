owner: Jadapema
repo: lingoready-status

# Monitors run every 5 minutes via GitHub Actions.
# Update the URLs when the API deploys to its real host.
sites:
  - name: Lingoready API
    url: https://api.lingoready.app/health
    expectedStatusCodes:
      - 200
  - name: Lingoready API — Remote config
    url: https://api.lingoready.app/v1/config
    expectedStatusCodes:
      - 200
  - name: Documentation site
    url: https://jadapema.github.io/lingoready-api-docs/

status-website:
  baseUrl: /lingoready-status
  name: Lingoready Status
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  introTitle: '**Lingoready** system status'
  introMessage: Real-time uptime, response times and incident history for the Lingoready API. Incidents are tracked as GitHub issues and appear here automatically.
  navbar:
    - title: Status
      href: /
    - title: API Docs
      href: https://jadapema.github.io/lingoready-api-docs/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  theme: light

# Uptime checks every 5 min; response-time graphs update daily
workflowSchedule:
  uptime: '*/5 * * * *'
  responseTime: '0 23 * * *'
  staticSite: '0 1 * * *'

commitMessages:
  commitAuthorName: Jadapema
  commitAuthorEmail: jadapema@gmail.com
